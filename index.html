<!DOCTYPE html>
<!-- JuScript v2.6 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JuScript">
<title>JuScript v2.6 — Teleprompter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Source+Serif+4:wght@500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --console:   #14161a;
    --panel:     #1c1f26;
    --panel-hi:  #262a33;
    --line:      #33384a;
    --steel:     #8a94a6;
    --steel-dim: #5a6270;
    --amber:     #ffb038;
    --green:     #60ff00;
    --paper:     #f4f2ec;
    --tally:     #ff3b30;
    --text:      #d7dce5;
    --readline:  #ffbf00;
    --ui:  "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Styrene B", "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --disp: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    background: var(--console);
    color: var(--text);
    font-family: var(--ui);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  button, input, .seg-ctl { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  button { user-select: none; -webkit-user-select: none; }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    padding-top: max(8px, env(safe-area-inset-top));
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .brand { display: flex; align-items: baseline; gap: 9px; font-family: var(--disp); }
  .brand .name { font-weight: 700; font-size: 15px; letter-spacing: 1.5px; color: var(--paper); }
  .brand .kind {
    font-family: var(--ui); font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--steel-dim);
  }

  .ver {
    font-size: 10px; letter-spacing: 1.5px; color: var(--steel-dim);
    font-variant-numeric: tabular-nums;
  }

  .spacer { flex: 1; }

  .seg-ctl { display: flex; border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
  .seg-ctl button {
    background: var(--panel-hi);
    color: var(--steel-dim);
    border: none;
    padding: 0 14px;
    min-height: 42px;
    font-family: var(--ui); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer;
    transition: background .12s, color .12s;
    display: flex; align-items: center; gap: 7px;
  }
  .seg-ctl button + button { border-left: 1px solid var(--line); }
  .seg-ctl button.on { background: var(--paper); color: #14161a; font-weight: 600; }
  .seg-ctl button:focus-visible { outline: 2px solid var(--amber); outline-offset: -2px; }
  .seg-ctl .arrow { font-size: 12px; line-height: 1; }

  .iconbtn {
    background: var(--panel-hi);
    color: var(--steel);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0 13px;
    min-height: 42px;
    font-family: var(--ui); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .iconbtn:hover { color: var(--paper); border-color: var(--steel-dim); }
  .iconbtn.on { background: var(--amber); color: #1a1400; border-color: var(--amber); font-weight: 600; }
  .iconbtn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  .topbar .iconbtn, .topbar .seg-ctl button {
    min-height: 36px;
    font-size: 9px;
    padding: 0 11px;
  }

  #topToggle .chev { display: block; transition: transform .2s; font-size: 11px; }
  body:not(.top-open) .topbar {
    position: absolute; top: 0; right: 0; z-index: 6;
    background: none; border-bottom: none;
    padding: max(4px, env(safe-area-inset-top)) 8px 4px;
  }
  body:not(.top-open) .topbar > *:not(#topToggle) { display: none; }
  body:not(.top-open) #topToggle { min-height: 26px; padding: 0 9px; opacity: .6; }
  body:not(.top-open) #topToggle:hover { opacity: 1; }
  body:not(.top-open) #topToggle .chev { transform: rotate(180deg); }

  /* ---------- prompt stage ---------- */
  .stage {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
    min-height: 0;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  body:not(.live) .stage { cursor: grab; }
  .stage.scrubbing, .stage.scrubbing .w { cursor: grabbing; }
  /* The fullscreen element is forced to transform:none by the browser, so the
     mirroring has to sit on a layer inside the stage rather than on the stage. */
  .flipper { position: absolute; inset: 0; }
  .stage.flip-h .flipper { transform: scaleX(-1); }
  .stage.flip-v .flipper { transform: scaleY(-1); }
  .stage.flip-h.flip-v .flipper { transform: scale(-1, -1); }

  .readline { position: absolute; pointer-events: none; z-index: 3; }
  .readline::before, .readline::after { content: ""; position: absolute; width: 0; height: 0; }

  .stage[data-axis="x"] .readline {
    left: 50%; top: 0; bottom: 0; width: 0;
    border-left: 2px solid var(--readline);
    opacity: .5;
    transform: translateX(-50%);
  }
  .stage[data-axis="x"] .readline::before {
    top: 12px; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-top: 9px solid var(--readline);
  }
  .stage[data-axis="x"] .readline::after {
    bottom: 12px; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-bottom: 9px solid var(--readline);
  }

  .stage[data-axis="y"] .readline {
    top: 50%; left: 0; right: 0; height: 0;
    border-top: 2px solid var(--readline);
    opacity: .5;
  }
  .stage[data-axis="y"] .readline::before {
    left: 12px; top: 50%; transform: translateY(-50%);
    border-top: 7px solid transparent; border-bottom: 7px solid transparent;
    border-left: 9px solid var(--readline);
  }
  .stage[data-axis="y"] .readline::after {
    right: 12px; top: 50%; transform: translateY(-50%);
    border-top: 7px solid transparent; border-bottom: 7px solid transparent;
    border-right: 9px solid var(--readline);
  }

  .vignette { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
  .stage[data-axis="x"] .vignette {
    background: linear-gradient(90deg,
      rgba(0,0,0,.92) 0%, rgba(0,0,0,0) 20%,
      rgba(0,0,0,0) 80%, rgba(0,0,0,.92) 100%);
  }
  .stage[data-axis="y"] .vignette {
    background: linear-gradient(180deg,
      rgba(0,0,0,.92) 0%, rgba(0,0,0,0) 18%,
      rgba(0,0,0,0) 82%, rgba(0,0,0,.92) 100%);
  }

  .track {
    position: absolute;
    z-index: 1;
    font-family: var(--sans);
    font-weight: 500;
    color: var(--amber);
    will-change: transform;
  }
  .track.font-serif {
    font-family: "Tiempos Text", "Source Serif 4", Georgia, "Times New Roman", serif;
    font-weight: 600;
  }

  .stage[data-axis="x"] .track {
    left: 0; top: 50%;
    white-space: pre;
    line-height: 1;
  }
  .stage[data-axis="y"] .track {
    top: 0; left: 50%;
    white-space: pre-wrap;
    word-break: break-word;
    width: 84%;
    max-width: 1100px;
    line-height: 1.32;
    text-align: left;
  }

  .gap { display: inline-block; width: 1.6em; }

  .w { border-radius: 4px; }
  body:not(.live) .w { cursor: pointer; }
  .w.hit { animation: hit .6s ease; }
  @keyframes hit { 0% { background: rgba(255,255,255,.3); } 100% { background: transparent; } }

  .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--steel-dim);
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    z-index: 1; text-align: center; padding: 0 40px;
    pointer-events: none;
  }

  /* ---------- transport ---------- */
  .controls {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px;
    background: var(--panel);
    border-top: 1px solid var(--line);
    flex-shrink: 0; flex-wrap: wrap;
  }

  .play {
    display: flex; align-items: center; gap: 11px;
    background: var(--green); color: #062611;
    border: none; border-radius: 4px;
    padding: 0 24px; min-height: 49px; min-width: 136px;
    font-family: var(--disp); font-weight: 700; font-size: 14px; letter-spacing: 2px;
    cursor: pointer; justify-content: center;
    transition: filter .12s, background .12s;
  }
  .play:hover { filter: brightness(1.08); }
  .play:focus-visible { outline: 2px solid var(--paper); outline-offset: 2px; }
  body.live .play { background: var(--amber); color: #1a1400; }

  .group { display: flex; align-items: center; gap: 8px; }
  .group > label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--steel-dim); white-space: nowrap;
  }
  .readout {
    font-size: 12px; color: var(--steel);
    min-width: 40px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .step {
    background: var(--panel-hi);
    color: var(--steel);
    border: 1px solid var(--line);
    border-radius: 3px;
    min-width: 42px; min-height: 42px;
    font-family: var(--ui); font-size: 18px; line-height: 1;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .step:hover { color: var(--paper); border-color: var(--steel-dim); }
  .step:active { background: var(--line); }
  .step:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    background: transparent;
    width: 150px; height: 42px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px; background: var(--line); border-radius: 3px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    margin-top: -10px;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--steel); border: 2px solid var(--panel);
    transition: background .12s;
  }
  input[type=range]::-webkit-slider-thumb:hover { background: var(--paper); }
  input[type=range]::-moz-range-track { height: 6px; background: var(--line); border-radius: 3px; }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--steel); border: 2px solid var(--panel); cursor: pointer;
  }
  input[type=range]:focus-visible { outline: 2px solid var(--amber); outline-offset: 4px; }

  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: none; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .swatch i {
    display: block; width: 24px; height: 24px; border-radius: 50%;
    background: currentColor;
    transition: transform .1s, box-shadow .1s;
  }
  .swatch:hover i { transform: scale(1.12); }
  .swatch.on i { box-shadow: 0 0 0 2px var(--panel), 0 0 0 4px var(--paper); }
  .swatch:focus-visible { outline: 2px solid var(--amber); outline-offset: -4px; border-radius: 4px; }

  /* ---------- script drawer ---------- */
  .editor {
    background: var(--console); border-top: 1px solid var(--line); flex-shrink: 0;
    padding-bottom: max(0px, env(safe-area-inset-bottom));
  }
  .editor-head {
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px; min-height: 38px;
  }
  body.tabs-open .editor-head, body.edit-open .editor-head { border-top: 1px solid var(--line); }
  .drawer-toggle {
    display: flex; align-items: center; gap: 8px;
    background: none; border: none; cursor: pointer;
    padding: 0 8px; min-height: 32px;
    font-family: var(--ui);
  }
  .drawer-toggle .lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--steel-dim); }
  .drawer-toggle .chev { color: var(--steel-dim); transition: transform .2s; font-size: 11px; }
  .drawer-toggle.open .chev { transform: rotate(180deg); }
  .drawer-toggle:hover .lbl, .drawer-toggle:hover .chev { color: var(--steel); }
  .drawer-toggle:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  .editor-head .count {
    margin-left: auto; font-size: 10px; color: var(--steel-dim); letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    padding-right: 4px;
  }

  body.tabs-open .tabrow { display: flex; }
  .edit-body { display: none; }
  body.edit-open .edit-body { display: block; }

  .tabrow {
    display: none; align-items: center; gap: 8px;
    padding: 6px 16px 8px;
  }
  .tabbar {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; flex: 1;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabbar::-webkit-scrollbar { display: none; }

  .tab {
    display: flex; align-items: center; gap: 9px;
    background: var(--panel-hi);
    color: var(--steel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0 13px;
    min-height: 40px;
    max-width: 210px;
    font-family: var(--ui); font-size: 12px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: background .12s, color .12s;
  }
  .tab .tname { overflow: hidden; text-overflow: ellipsis; }
  .tab .tx {
    font-size: 15px; line-height: 1; opacity: .55; padding: 3px 1px;
  }
  .tab .tx:hover { opacity: 1; }
  .tab.on { background: var(--paper); color: #14161a; border-color: var(--paper); font-weight: 600; }
  .tab:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  .tabtool {
    background: var(--panel-hi);
    color: var(--steel);
    border: 1px solid var(--line);
    border-radius: 4px;
    min-width: 40px; min-height: 40px;
    padding: 0 11px;
    font-family: var(--ui); font-size: 12px;
    cursor: pointer; flex-shrink: 0;
    transition: color .12s, border-color .12s;
  }
  .tabtool:hover { color: var(--paper); border-color: var(--steel-dim); }
  .tabtool:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  textarea {
    width: 100%; height: 140px;
    background: var(--console); color: var(--text);
    border: none;
    padding: 14px 16px;
    font-family: var(--sans); font-size: 16px; line-height: 1.6;
    resize: none; outline: none;
    white-space: pre-wrap;
  }
  textarea::placeholder { color: var(--steel-dim); }

  .stage:fullscreen { background: #000; }
  .stage:-webkit-full-screen { background: #000; }

  /* ---------- link / remote ---------- */
  .pip {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--steel-dim); flex-shrink: 0;
    transition: background .2s;
  }
  .pip.warn { background: var(--amber); }
  .pip.on   { background: var(--green); }
  .pip.err  { background: var(--tally); }

  #linkBtn { display: inline-flex; align-items: center; gap: 7px; }
  #linkBtn .code { letter-spacing: 2px; font-weight: 600; }

  .remote-only { display: none !important; }
  body.remote .remote-only { display: flex !important; align-items: center; justify-content: center; }
  body.remote #editor,
  body.remote #flipH,
  body.remote #flipV,
  body.remote .prompter-only { display: none !important; }
  body.remote .brand .kind { display: inline; color: var(--amber); }

  .sheet {
    position: fixed; inset: 0; z-index: 20; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.74); padding: 18px;
  }
  body.sheet-open .sheet { display: flex; }
  .sheet-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 18px; width: 100%; max-width: 420px;
    max-height: 90dvh; overflow-y: auto;
  }
  .sheet-title {
    font-family: var(--disp); font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--paper); margin-bottom: 4px;
  }
  .sheet-sub {
    font-size: 11px; line-height: 1.6; color: var(--steel-dim); margin-bottom: 16px;
  }
  .fld { display: block; margin-bottom: 14px; }
  .fld span {
    display: block; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--steel-dim); margin-bottom: 6px;
  }
  .fld input {
    width: 100%; min-height: 46px; padding: 0 12px;
    background: var(--console); color: var(--text);
    border: 1px solid var(--line); border-radius: 3px;
    font-family: var(--ui); font-size: 15px;
  }
  .fld input:focus { outline: 2px solid var(--amber); outline-offset: -1px; }
  #roomCode { letter-spacing: 5px; font-weight: 600; text-transform: uppercase; font-size: 20px; }
  .sheet-note {
    font-size: 11px; line-height: 1.7; color: var(--steel);
    background: var(--console); border: 1px solid var(--line); border-radius: 3px;
    padding: 10px 12px; margin-bottom: 14px; word-break: break-all;
  }
  .sheet-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* remote runs a tighter transport bar; 40px is the floor for touch targets */
  body.remote .controls { gap: 12px; padding: 9px 13px; }
  body.remote .controls .step { min-width: 43px; min-height: 43px; font-size: 17px; }
  body.remote .controls input[type=range] { width: 144px; height: 43px; }
  body.remote .controls .readout { font-size: 12px; min-width: 38px; }
  body.remote .controls .group > label { font-size: 8.5px; letter-spacing: 1.9px; }
  body.remote .play { min-height: 49px; min-width: 131px; font-size: 14px; padding: 0 22px; }

  /* prompter chrome the assistant can collapse remotely */
  body.clean .controls, body.clean .editor { display: none !important; }
  .sheet-link {
    font-size: 12px; line-height: 1.7; color: var(--amber);
    background: var(--console); border: 1px solid var(--line); border-radius: 3px;
    padding: 11px 12px; margin-bottom: 14px; word-break: break-all;
    user-select: all; -webkit-user-select: all;
  }
  details.adv { margin-top: 16px; border-top: 1px solid var(--line); padding-top: 12px; }
  details.adv summary {
    list-style: none; cursor: pointer;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--steel-dim); min-height: 30px; display: flex; align-items: center; gap: 7px;
  }
  details.adv summary::-webkit-details-marker { display: none; }
  details.adv summary::before { content: "\25b8"; transition: transform .15s; }
  details.adv[open] summary::before { transform: rotate(90deg); }
  details.adv summary:hover { color: var(--steel); }
  details.adv .fld { margin-top: 12px; }

  @media (max-width: 760px) {
    .brand .kind { display: none; }
    .controls { gap: 12px; }
    input[type=range] { width: 116px; }
    body.remote .controls input[type=range] { width: 111px; }
  }
</style>
</head>
<body class="tabs-open edit-open top-open">

  <div class="topbar">
    <div class="brand">
      <span class="name">JuScript</span>
      <span class="kind">Teleprompter</span>
    </div>
    <span class="ver">v2.6</span>
    <div class="spacer"></div>

    <div class="seg-ctl prompter-only" role="group" aria-label="Scroll direction">
      <button id="axisX" class="on" aria-pressed="true"><span class="arrow">←</span>Sideways</button>
      <button id="axisY" aria-pressed="false"><span class="arrow">↑</span>Upward</button>
    </div>

    <button class="iconbtn" id="flipH" title="Mirror left-right for beam-splitter glass">Flip H</button>
    <button class="iconbtn" id="flipV" title="Mirror top-bottom for beam-splitter glass">Flip V</button>
    <button class="iconbtn" id="linkBtn" title="Pair a remote"><span class="pip" id="linkPip"></span><span class="code" id="linkLabel">----</span></button>
    <button class="iconbtn prompter-only" id="fsBtn" title="Fill the screen with the prompt">Fullscreen</button>
    <button class="iconbtn" id="topToggle" aria-expanded="true" title="Show or hide the top controls"><span class="chev">▲</span></button>
  </div>

  <div class="stage" id="stage" data-axis="x">
    <div class="flipper">
      <div class="vignette"></div>
      <div class="readline"></div>
      <div class="placeholder" id="placeholder">Type or paste your script below, then press Play</div>
      <div class="track" id="track"></div>
    </div>
  </div>

  <div class="controls">
    <button class="play" id="playBtn"><span id="playIcon">▶</span><span id="playLabel">PLAY</span></button>
    <button class="iconbtn" id="resetBtn" title="Return to the start">Reset</button>

    <button class="iconbtn remote-only" id="fsRemote" title="Fill the prompter's screen">Fullscreen</button>

    <div class="group">
      <label>Speed · WPM</label>
      <button class="step" id="speedDown" aria-label="Decrease words per minute">−</button>
      <input type="range" id="speed" min="60" max="400" value="145" step="5" aria-label="Speaking pace in words per minute">
      <button class="step" id="speedUp" aria-label="Increase words per minute">+</button>
      <span class="readout" id="speedOut">145</span>
    </div>

    <div class="group prompter-only">

  <div class="editor" id="editor">
    <div class="edit-body">
      <textarea id="script" spellcheck="false" placeholder="Paste your script here. Line breaks and extra spaces are kept — in Upward mode they break the line, in Sideways mode they open a gap."></textarea>
    </div>
    <div class="tabrow">
        <div class="tabbar" id="tabbar"></div>
        <button class="tabtool" id="newTab" title="New script" aria-label="New script">＋</button>
        <button class="tabtool" id="importBtn" title="Import scripts from a backup file">Import</button>
        <button class="tabtool" id="exportBtn" title="Save all scripts to a backup file">Export</button>
        <input type="file" id="fileIn" accept=".json,application/json" hidden>
    </div>
    <div class="editor-head">
      <button class="drawer-toggle open" id="tabsToggle" aria-expanded="true"><span class="lbl">Scripts</span><span class="chev">▲</span></button>
      <button class="drawer-toggle open" id="editToggle" aria-expanded="true"><span class="lbl">Editor</span><span class="chev">▲</span></button>

  <div class="sheet" id="sheet">
    <div class="sheet-card">

        <summary>Advanced</summary>
        <label class="fld"><span>Relay address</span><input type="url" id="relayUrl" spellcheck="false" autocapitalize="off" autocorrect="off"></label>
        <label class="fld"><span>Room code</span><input type="text" id="roomCode" maxlength="8" spellcheck="false" autocapitalize="characters" autocorrect="off"></label>
      </details>

  </div>

<script>
(function () {
  const stage       = document.getElementById('stage');
  const track       = document.getElementById('track');
  const placeholder = document.getElementById('placeholder');
  const scriptEl    = document.getElementById('script');
  const playBtn     = document.getElementById('playBtn');
  const playIcon    = document.getElementById('playIcon');
  const playLabel   = document.getElementById('playLabel');
  const resetBtn    = document.getElementById('resetBtn');
  const speedEl     = document.getElementById('speed');
  const speedOut    = document.getElementById('speedOut');
  const paceEl      = document.getElementById('pace');
  const paceOut     = document.getElementById('paceOut');
  const sizeEl      = document.getElementById('size');
  const sizeOut     = document.getElementById('sizeOut');
  const countEl     = document.getElementById('count');
  const axisXBtn    = document.getElementById('axisX');
  const axisYBtn    = document.getElementById('axisY');
  const flipHBtn    = document.getElementById('flipH');
  const flipVBtn    = document.getElementById('flipV');
  const fsBtn       = document.getElementById('fsBtn');
  const fontSansBtn = document.getElementById('fontSans');
  const fontSerifBtn= document.getElementById('fontSerif');
  const tabbar      = document.getElementById('tabbar');
  const newTabBtn   = document.getElementById('newTab');
  const exportBtn   = document.getElementById('exportBtn');
  const importBtn   = document.getElementById('importBtn');
  const fileIn      = document.getElementById('fileIn');

  const KEY = 'juscript:v1';
  const PALETTE = ['#ffffff', '#60ff00', '#ff00bf'];
  // The relay this app ships with. Baked in so it never has to be typed.
  // Change it here if you ever move the relay somewhere else.
  // Must be declared before load()/seed() run, further down.
  const DEFAULT_RELAY = 'wss://juscript-relay.hi-justinong.workers.dev';

  const qs       = new URLSearchParams(location.search);
  const isRemote = location.hash.slice(1).split('&').indexOf('remote') !== -1;
  const urlCode  = (qs.get('r') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
  const urlRelay = (qs.get('u') || '').trim();

  const WELCOME = 'Welcome to JuScript. Paste a script here, or press + above to add another. Drag the stage to move through the script, or tap a word to snap it to the reading line.';

  let running = false;
  let pos     = 0;      // px offset along the active axis; 0 at start, negative as it advances
  let tCur    = 0;      // seconds elapsed along the timeline
  let travel  = 0;
  let lastTs  = null;
  let lastPosSave = 0;
  let wakeLock = null;

  // pacing timeline
  let spline = null;    // t (s) -> pos (px)
  let TTotal = 0;       // full duration in seconds
  let tsA = null, ysA = null;   // blended anchors, for inverse lookup
  let wordT = [], wordP = [];   // per-word blended time / position
  let wordOff = [];             // per-word geometric offset along the axis (device-local)
  let rowOff  = [];             // distinct offsets, ascending (a "row" = a wrapped line)
  let wordRow = [];             // row index for each word
  let rowFirst = [];            // first word index of each row

  /* ---- pacing math ---- */

  // syllable counts for spoken numbers: zero..nineteen, then tens
  const ONES = [2,1,1,1,1,1,1,2,1,1,1,3,1,2,2,2,2,3,2,2];
  const TENS = [0,0,2,2,2,2,2,3,2,2];

  function numSyl(n) {
    n = Math.floor(Math.abs(n));
    if (n < 20) return ONES[n];
    if (n < 100) { const r = n % 10; return TENS[(n / 10) | 0] + (r ? ONES[r] : 0); }
    if (n < 1000) { const r = n % 100; return ONES[(n / 100) | 0] + 2 + (r ? numSyl(r) : 0); }
    let s = 0, x = n;
    const units = [[1e9, 2], [1e6, 2], [1e3, 2]];
    for (const [u, us] of units) {
      if (x >= u) { s += numSyl((x / u) | 0) + us; x %= u; }
    }
    return s + (x ? numSyl(x) : 0);
  }

  function sylCount(tok) {
    let w = tok.replace(/^[^A-Za-z0-9$&]+|[^A-Za-z0-9%]+$/g, '');
    if (!w) return 1;
    if (w === '&') return 1;
    let extra = 0;
    if (w[0] === '$') { extra += 2; w = w.slice(1); }          // "dollars"
    if (/%$/.test(w)) { extra += 2; w = w.replace(/%$/, ''); } // "percent"
    if (!w) return Math.max(1, extra);

    // plain number, optionally with commas / decimal
    if (/^\d[\d,]*(\.\d+)?$/.test(w)) {
      const parts = w.replace(/,/g, '').split('.');
      const ip = parts[0], dp = parts[1];
      let s;
      const n = parseInt(ip, 10) || 0;
      if (ip.length === 4 && n >= 1100 && n <= 2999 && n % 100 !== 0) {
        s = numSyl((n / 100) | 0) + numSyl(n % 100);           // "twenty twenty-six"
      } else if (ip.length > 12) {
        s = ip.length;                                          // read digit by digit
      } else {
        s = numSyl(n);
      }
      if (dp) s += 1 + [...dp].reduce((a, d) => a + ONES[+d], 0); // "point ..."
      return Math.max(1, s + extra);
    }

    // mixed like 4K, MP4 — split runs and sum
    if (/\d/.test(w) && /[A-Za-z]/.test(w)) {
      let s = 0;
      for (const run of (w.match(/\d+|[A-Za-z]+/g) || [])) s += sylCount(run);
      return Math.max(1, s + extra);
    }

    // acronym spoken letter by letter: 2-6 capitals (dots allowed)
    const bare = w.replace(/\./g, '');
    if (/^[A-Z]{2,6}$/.test(bare)) {
      return extra + [...bare].reduce((a, c) => a + (c === 'W' ? 3 : 1), 0);
    }

    // ordinary word(s); handle hyphens and possessives
    let total = 0;
    for (const part of w.toLowerCase().replace(/['\u2019]s?$/, '').split(/[-\u2013/]/)) {
      const p = part.replace(/[^a-z]/g, '');
      if (!p) continue;
      let c = (p.match(/[aeiouy]+/g) || []).length;
      if (c > 1 && /e$/.test(p) && !/le$/.test(p)) c--;                 // silent e
      if (c > 1 && /[^aeiouy]ed$/.test(p) && !/[td]ed$/.test(p)) c--;   // walked, not added
      total += Math.max(1, c);
    }
    return Math.max(1, total + extra);
  }

  function pauseFor(tok, ws) {
    let p = 0;
    if (/[.!?\u2026]["')\]]*$/.test(tok)) p += 0.5;
    else if (/[,;:\u2014\u2013]["')\]]*$/.test(tok)) p += 0.24;
    const nl = (ws.match(/\n/g) || []).length;
    if (nl >= 2) p += 0.8;
    else if (nl === 1) p += 0.35;
    return Math.min(p, 1.3);
  }

  function spokenLen(tok) {
    const bare = tok.replace(/[^A-Za-z0-9]/g, '');
    if (!bare) return 1;
    if (/^\d/.test(bare) || /^[A-Z]{2,6}$/.test(bare)) return null; // expanded forms: caller falls back to syllables
    return Math.max(1, bare.length);
  }

  // Pure timing engine. items: [{off, offEnd, syl, pause, slen}] in reading order.
  // opts: {C, travel, wpm, alpha}. Returns anchor times/positions, total duration,
  // and the anchor index for each word's start.
  function buildAnchors(items, opts) {
    const n = items.length;
    if (!n) return null;
    const LAMBDA = 0.3;   // phonetic-length weighting

    let R = 0;
    for (const it of items) R += it.syl + LAMBDA * it.slen;
    const Twords = 60 * n / Math.max(60, opts.wpm);
    const dur = items.map(it => Math.max(0.09, (it.syl + LAMBDA * it.slen) / R * Twords));

    let Tsp = 0;
    for (let i = 0; i < n; i++) Tsp += dur[i] + items[i].pause;

    const span = Math.max(1, items[n - 1].offEnd - items[0].off);
    const vAvg = span / Math.max(0.4, Tsp);
    const A0 = opts.C - items[0].off;
    const Lin = Math.max(0.15, (A0 < 0 ? -A0 : 0) / vAvg);

    // speech-exact anchors; pauses become their own segments (holds / slow drifts)
    const ts = [0], ys = [0], wordIdx = new Array(n);
    let t = Lin;
    ts.push(t); ys.push(A0); wordIdx[0] = ts.length - 1;
    for (let i = 0; i < n; i++) {
      t += dur[i];
      const endPos = opts.C - items[i].offEnd;
      if (i < n - 1) {
        if (items[i].pause > 0.01) {
          ts.push(t); ys.push(endPos);      // word finishes on the line
          t += items[i].pause;              // ...then the pause drifts across the gap
        }
        ts.push(t); ys.push(opts.C - items[i + 1].off);
        wordIdx[i + 1] = ts.length - 1;
      } else {
        ts.push(t); ys.push(endPos);
        if (items[i].pause > 0.01) {
          t += items[i].pause;
          ts.push(t); ys.push(endPos);      // trailing hold
        }
      }
    }
    const lastPos = ys[ys.length - 1];
    const Lout = Math.max(0.15, (lastPos - (-opts.travel)) / vAvg);
    t += Lout;
    ts.push(t); ys.push(-opts.travel);
    const T = t;

    // blend toward constant speed, with a readability ceiling on segment velocity
    const v0 = opts.travel / T;
    const vMax = 1.5 * v0;
    const alpha = Math.max(0, Math.min(1, opts.alpha));
    const bys = [0];
    let acc = 0;
    for (let k = 0; k < ts.length - 1; k++) {
      const dt = ts[k + 1] - ts[k];
      const vSp = (ys[k] - ys[k + 1]) / dt;
      let a = alpha;
      if (vSp > vMax) a = Math.min(alpha, Math.max(0, (vMax - v0) / (vSp - v0)));
      const v = (1 - a) * v0 + a * vSp;
      acc -= v * dt;
      bys.push(acc);
    }
    const scale = (-opts.travel) / acc;
    for (let k = 0; k < bys.length; k++) bys[k] *= scale;

    return { ts: ts, ys: bys, T: T, wordIdx: wordIdx };
  }

  function tokenize(raw) {
    const out = [];
    const re = /(\S+)(\s*)/g;
    let m;
    while ((m = re.exec(raw))) out.push({ w: m[1], ws: m[2] });
    return out;
  }

  // monotone cubic interpolation (Fritsch-Carlson) through (ts, ys)
  function pchip(ts, ys) {
    const n = ts.length;
    const h = [], d = [];
    for (let i = 0; i < n - 1; i++) {
      h[i] = ts[i + 1] - ts[i];
      d[i] = (ys[i + 1] - ys[i]) / h[i];
    }
    const m = new Array(n);
    m[0] = d[0];
    m[n - 1] = d[n - 2];
    for (let i = 1; i < n - 1; i++) {
      if (d[i - 1] * d[i] <= 0) m[i] = 0;
      else {
        const w1 = 2 * h[i] + h[i - 1], w2 = h[i] + 2 * h[i - 1];
        m[i] = (w1 + w2) / (w1 / d[i - 1] + w2 / d[i]);
      }
    }
    let seg = 0;
    return function (t) {
      if (t <= ts[0]) return ys[0];
      if (t >= ts[n - 1]) return ys[n - 1];
      if (!(ts[seg] <= t && t < ts[seg + 1])) {
        let lo = 0, hi = n - 1;
        while (hi - lo > 1) {
          const mid = (lo + hi) >> 1;
          if (ts[mid] <= t) lo = mid; else hi = mid;
        }
        seg = lo;
      }
      const i = seg, x = (t - ts[i]) / h[i], x2 = x * x, x3 = x2 * x;
      return ys[i] * (2 * x3 - 3 * x2 + 1) + h[i] * m[i] * (x3 - 2 * x2 + x)
           + ys[i + 1] * (-2 * x3 + 3 * x2) + h[i] * m[i + 1] * (x3 - x2);
    };
  }

  /* ---- end pacing math ---- */

  /* ---------- store ---------- */

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function seed() {
    const id = uid();
    return {
      scripts: [{ id: id, name: 'Script 1', text: WELCOME, posX: 0, posY: 0 }],
      activeId: id,
      settings: {
        axis: 'x',
        x: { size: 130 },
        y: { size: 64 },
        wpm: 145,
        pacing: 0,
        color: '#ffffff',
        font: 'sans',
        ui: { tabs: true, edit: true, top: true },
        flipH: false,
        flipV: false,
        link: { url: DEFAULT_RELAY, code: null }
      }
    };
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !Array.isArray(s.scripts) || !s.scripts.length || !s.settings) return null;
      if (!s.scripts.some(sc => sc.id === s.activeId)) s.activeId = s.scripts[0].id;
      // migrate from the px-per-second build
      if (typeof s.settings.wpm !== 'number') s.settings.wpm = 145;
      if (typeof s.settings.pacing !== 'number') s.settings.pacing = 0;
      // v2.1 — one-time reset of pacing to off; change it freely afterwards
      if (!s.settings.pacingReset) { s.settings.pacing = 0; s.settings.pacingReset = true; }
      if (!s.settings.x) s.settings.x = { size: 130 };
      if (!s.settings.y) s.settings.y = { size: 64 };
      delete s.settings.x.speed;
      delete s.settings.y.speed;
      if (!s.settings.ui) s.settings.ui = { tabs: true, edit: true, top: true };
      if (typeof s.settings.ui.top !== 'boolean') s.settings.ui.top = true;
      if (PALETTE.indexOf(s.settings.color) === -1) s.settings.color = '#ffffff';
      // v1.6 — remote link settings
      if (!s.settings.link || typeof s.settings.link !== 'object') s.settings.link = {};
      if (typeof s.settings.link.url !== 'string') s.settings.link.url = '';
      if (!s.settings.link.url) s.settings.link.url = DEFAULT_RELAY;
      if (!/^[A-Z0-9]{4,8}$/.test(s.settings.link.code || '')) s.settings.link.code = null;
      return s;
    } catch (e) { return null; }
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(store)); } catch (e) { /* storage full or blocked */ }
  }

  let store = load() || seed();
  let axis = (store.settings.axis === 'y') ? 'y' : 'x';

  function active() { return store.scripts.find(s => s.id === store.activeId); }

  function saveCurrentPos() {
    const a = active();
    if (!a) return;
    if (axis === 'x') a.posX = pos; else a.posY = pos;
  }

  function persistControls() {
    store.settings.wpm = +speedEl.value;
    store.settings.pacing = +paceEl.value;
    store.settings[axis].size = +sizeEl.value;
    save();
  }

  /* ---------- link (remote control) ---------- */

  const CODE_ALPHA = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  function makeCode() {
    let c = '';
    for (let i = 0; i < 4; i++) c += CODE_ALPHA[(Math.random() * CODE_ALPHA.length) | 0];
    return c;
  }

  let promptW  = 0;   // the prompter's stage width, so we can match its wrapping
  let mirrorPx = 0;   // the font size actually applied on this remote

  const link = { ws: null, ok: false, peers: 0, tries: 0, timer: null,
                 lastSent: 0, lastKey: '', lastWpm: 0, lastSize: 0, want: false };
  let docTimer = null;

  function linkStatus() {
    const pip = document.getElementById('linkPip');
    const lbl = document.getElementById('linkLabel');
    if (lbl) lbl.textContent = store.settings.link.code || '----';
    if (!pip) return;
    pip.className = 'pip' + (!link.want ? '' : link.ok ? (link.peers > 1 ? ' on' : ' warn') : ' err');
  }

  function linkSend(o) {
    if (link.ws && link.ws.readyState === 1) {
      try { link.ws.send(JSON.stringify(o)); } catch (e) {}
    }
  }

  function linkConnect() {
    const cfg = store.settings.link;
    clearTimeout(link.timer);
    if (link.ws) { try { link.ws.onclose = null; link.ws.close(); } catch (e) {} link.ws = null; }
    if (!cfg.url || !/^wss?:\/\//i.test(cfg.url) || !cfg.code) {
      link.want = false; link.ok = false; link.peers = 0; linkStatus(); return;
    }
    link.want = true;
    let ws;
    try { ws = new WebSocket(cfg.url + '?room=' + encodeURIComponent(cfg.code)); }
    catch (e) { linkRetry(); return; }
    link.ws = ws;
    ws.onopen = function () {
      link.ok = true; link.tries = 0; linkStatus();
      linkSend({ t: 'hello', role: isRemote ? 'remote' : 'prompter' });
      if (isRemote) keepAwake(); else { sendDoc(); sendState(true); }
    };
    ws.onmessage = function (e) { try { onLinkMsg(JSON.parse(e.data)); } catch (err) {} };
    ws.onclose = function () { link.ok = false; link.peers = 0; linkStatus(); linkRetry(); };
    ws.onerror = function () { try { ws.close(); } catch (e) {} };
  }

  function linkRetry() {
    if (!link.want) return;
    clearTimeout(link.timer);
    link.timer = setTimeout(linkConnect,
      Math.min(8000, 400 * Math.pow(1.7, Math.min(link.tries++, 6))));
  }

  function onLinkMsg(m) {
    if (!m || !m.t) return;
    if (m.t === 'peers') { link.peers = m.n; linkStatus(); return; }
    if (isRemote) {
      if (m.t === 'doc') applyDoc(m);
      else if (m.t === 'state') applyState(m);
    } else {
      if (m.t === 'hello' && m.role === 'remote') { sendDoc(); sendState(true); }
      else if (m.t === 'cmd') applyCmd(m);
    }
  }

  /* --- prompter side --- */

  // The text column is the same fraction of the stage on both devices, so
  // scaling the prompter's text size by the ratio of stage widths reproduces
  // its line breaks exactly, at a size that suits this screen.
  // Width of the actual text column, mirroring the CSS (84% of the stage in
  // upward mode, capped at 1100px). Both devices apply the same rule.
  function colW(sw) { return (axis === 'y') ? Math.min(sw * 0.84, 1100) : sw; }

  function mirrorFontPx() {
    if (!isRemote || !promptW || !stage.clientWidth) return +sizeEl.value;
    const k = colW(stage.clientWidth) / colW(promptW);
    return Math.max(8, Math.round(+sizeEl.value * k * 10) / 10);
  }

  function applyTrackSize() {
    const px = mirrorFontPx();
    if (isRemote && Math.abs(px - mirrorPx) < 0.3) return false;
    mirrorPx = px;
    track.style.fontSize = px + 'px';
    return true;
  }

  function readLineC() {
    return (axis === 'x') ? stage.clientWidth * 0.5 : stage.clientHeight * 0.5;
  }

  // Which word is sitting on the read line right now, as an index + fraction
  // toward the next word. Purely geometric, so it is independent of screen
  // size, text size, orientation and the pacing curve.
  // How far through the script the read line is, as a fractional word count.
  // Words are the only unit both devices agree on, so the fraction is measured
  // across the words on the current row rather than across the row itself.
  function currentWord() { return wfAt(pos); }

  function wfAt(p) {
    const n = rowOff.length, total = wordOff.length;
    if (!n) return 0;
    const x = readLineC() - p;
    if (x <= rowOff[0]) return 0;
    if (x >= rowOff[n - 1]) return total - 1;
    let lo = 0, hi = n - 1;
    while (hi - lo > 1) { const md = (lo + hi) >> 1; if (rowOff[md] <= x) lo = md; else hi = md; }
    const span = rowOff[hi] - rowOff[lo];
    const fr = span > 0 ? (x - rowOff[lo]) / span : 0;
    const a = rowFirst[lo], b = (lo + 1 < n) ? rowFirst[lo + 1] : total;
    return a + fr * (b - a);
  }

  // Scroll speed in words per second. Reported even while paused, so the
  // remote knows how fast to start moving the instant PLAY is pressed
  // rather than waiting for two packets to work it out.
  function currentVel() {
    if (!spline || !TTotal) return 0;
    const h = 0.15;
    const t0 = Math.max(0, Math.min(Math.max(0, TTotal - h), tCur));
    let v = (wfAt(spline(t0 + h)) - wfAt(spline(t0))) / h;
    // wfAt clamps during the lead-in and run-out, which would report a
    // standstill; fall back to the script's average rate there
    if (v <= 0.01 && wordOff.length > 1) v = wordOff.length / Math.max(1, TTotal);
    return Math.max(0, Math.min(40, v));
  }

  function sendDoc() {
    if (isRemote || !link.ok) return;
    const a = active();
    linkSend({ t: 'doc', text: a ? a.text : '', name: a ? a.name : '', axis: axis });
  }
  function sendDocSoon() {
    if (isRemote) return;
    clearTimeout(docTimer);
    docTimer = setTimeout(sendDoc, 350);
  }

  function sendState(force) {
    if (isRemote || !link.ok) return;
    const now = performance.now();
    const wf = currentWord();
    const key = Math.round(wf) + '|' + (running ? 1 : 0) + '|' + speedEl.value;
    if (!force) {
      if (now - link.lastSent < 120) return;        // hard rate cap while rolling
      if (!running && key === link.lastKey) return; // idle and unchanged: say nothing
    }
    link.lastSent = now;
    link.lastKey = key;
    linkSend({ t: 'state', wf: wf, running: running,
               v: currentVel(),
               wpm: +speedEl.value, size: +sizeEl.value, sw: stage.clientWidth,
               clean: document.body.classList.contains('clean'),
               el: tCur, tot: TTotal });
  }

  let saveTimer = null;
  function saveSoon() {
    if (saveTimer) return;
    saveTimer = setTimeout(() => { saveTimer = null; save(); }, 700);
  }

  function applyCmd(m) {
    switch (m.c) {
      case 'toggle':
        toggle();
        break;
      case 'reset':
        reset();
        break;
      case 'wpm':
        bump(speedEl, +m.d || 0, afterSpeed);
        break;
      case 'sizeset':
        sizeEl.value = Math.max(+sizeEl.min, Math.min(+sizeEl.max, +m.v || 64));
        afterSize();
        persistControls();
        break;
      case 'clean': {
        const on = !document.body.classList.contains('clean');
        document.body.classList.toggle('clean', on);
        store.settings.ui.top = !on;
        applyDrawers();
        requestAnimationFrame(() => { measure(); sendState(true); });
        break;
      }
      case 'wpmset':
        speedEl.value = Math.max(+speedEl.min, Math.min(+speedEl.max, +m.v || 145));
        afterSpeed();
        persistControls();
        break;
      case 'pause':
        if (running) stop();
        break;
      case 'seek': {
        stopMomentum();
        const so = offsetFor(+m.wf || 0);
        if (so != null) {
          pos = Math.max(-travel, Math.min(0, readLineC() - so));
          tCur = invertPos(pos);
          applyTransform();
          saveCurrentPos();
        }
        break;
      }
      case 'jump':
        if (wordOff[m.wi] != null) {
          stopMomentum();
          pos = Math.max(-travel, Math.min(0, readLineC() - wordOff[m.wi]));
          tCur = invertPos(pos);
          applyTransform();
          saveCurrentPos();
        }
        break;
    }
    sendState(true);
    saveSoon();
  }

  /* --- remote side --- */

  // Render slightly in the past and interpolate between the two packets that
  // bracket that moment. Smooth motion at 60fps regardless of packet timing,
  // instead of chasing each packet with a lagging filter.
  // Dead reckoning: the remote advances its own position every frame at the
  // speed the prompter reported, and treats arriving packets as corrections.
  // Starts instantly and stays smooth between packets.
  let rWf = null, rVel = 0, rCorr = 0, rSeen = 0, rLast = 0, rRaf = 0, rRunning = false;

  function fmtT(v) {
    v = Math.max(0, Math.round(v || 0));
    return Math.floor(v / 60) + ':' + String(v % 60).padStart(2, '0');
  }

  function applyDoc(m) {
    scriptEl.value = m.text || '';
    rWf = null; rCorr = 0; rSeen = 0;
    if (m.axis && m.axis !== axis) setAxis(m.axis);
    else render();
  }

  function paintTransport() {
    document.body.classList.toggle('live', rRunning);
    playIcon.textContent  = rRunning ? '\u275a\u275a' : '\u25b6';
    playLabel.textContent = rRunning ? 'PAUSE' : 'PLAY';
  }

  // Turn a reported fractional word count into an offset in this device's
  // own layout. Mirror image of currentWord().
  function offsetFor(wf) {
    const n = rowOff.length, total = wordOff.length;
    if (!n) return null;
    const w = Math.max(0, Math.min(total - 1, Math.floor(wf)));
    const r = wordRow[w];
    const a = rowFirst[r], b = (r + 1 < n) ? rowFirst[r + 1] : total;
    const fr = (b > a) ? Math.max(0, Math.min(1, (wf - a) / (b - a))) : 0;
    const o0 = rowOff[r], o1 = (r + 1 < n) ? rowOff[r + 1] : o0;
    return o0 + (o1 - o0) * fr;
  }

  function applyState(m) {
    rRunning = !!m.running;
    paintTransport();
    if (performance.now() - link.lastWpm > 900 && +speedEl.value !== +m.wpm) {
      speedEl.value = m.wpm;
      speedOut.textContent = m.wpm;
    }
    if (+m.sw) promptW = +m.sw;
    if (m.size != null && +m.size !== +sizeEl.value &&
        performance.now() - link.lastSize > 900) {
      sizeEl.value = m.size;
      sizeOut.textContent = m.size;
    }
    if (applyTrackSize()) measure();   // wrapping changed; word position still valid
    const fsR = document.getElementById('fsRemote');
    if (fsR) fsR.classList.toggle('on', !!m.clean);
    rVel = Math.max(0, +m.v || 0);
    if (!rHeld()) {
      const target = +m.wf || 0;
      rSeen = target;
      if (rWf === null || !rRunning) { rWf = target; rCorr = 0; }
      else if (Math.abs(target - rWf) > 8) { rWf = target; rCorr = 0; }  // a real jump
      else rCorr = target - rWf;                                         // bleed it in
    }
    startRemote();
  }

  function remoteFrame(ts) {
    rRaf = 0;
    const dt = (rLast && ts - rLast < 250) ? (ts - rLast) / 1000 : 0;
    rLast = ts;
    if (!rHeld() && rWf !== null && rowOff.length) {
      let step = 0;
      // predict forward, but never run more than about half a second past the
      // last confirmed position, so a busy prompter can't strand us
      if (rRunning && (rWf - rSeen) < Math.max(1, rVel * 0.5)) step += rVel * dt;
      if (rCorr) { const k = Math.min(1, dt * 5); const c = rCorr * k; rCorr -= c; step += c; }
      // while rolling the text must never travel backwards: a rearward
      // correction becomes a brief stall and the prompter closes the gap
      if (rRunning && step < 0) step = 0;
      rWf = Math.max(0, Math.min(wordOff.length - 1, rWf + step));
      const off = offsetFor(rWf);
      if (off != null) {
        pos = Math.max(-travel, Math.min(0, readLineC() - off));
        applyTransform();
      }
    }
    if (rRunning || rHeld()) rRaf = requestAnimationFrame(remoteFrame);
  }

  function startRemote() { if (!rRaf) rRaf = requestAnimationFrame(remoteFrame); }

  // While she is dragging, incoming positions are ignored so the prompter's
  // echo can't fight her hand. Her position is pushed out instead.
  let rHoldUntil = 0, rSeekAt = 0;
  function rHold(ms) { rHoldUntil = performance.now() + ms; }
  function rHeld()   { return performance.now() < rHoldUntil; }
  function sendSeek(force) {
    // Keep the predictor in step with her hand. Without this, rWf still holds
    // the position from before the drag and the next frame snaps back to it.
    const wf = currentWord();
    rWf = wf;
    rCorr = 0;
    rSeen = wf;
    const now = performance.now();
    if (!force && now - rSeekAt < 90) return;
    rSeekAt = now;
    cmd('seek', { wf: wf });
  }

  function cmd(c, extra) {
    linkSend(Object.assign({ t: 'cmd', c: c }, extra || {}));
  }

  /* ---------- rendering ---------- */

  function buildWords(text, container) {
    const parts = text.split(/(\s+)/);
    for (const p of parts) {
      if (!p) continue;
      if (/^\s+$/.test(p)) {
        container.appendChild(document.createTextNode(p));
      } else {
        const s = document.createElement('span');
        s.className = 'w';
        s.textContent = p;
        container.appendChild(s);
      }
    }
  }

  function render() {
    stopMomentum();
    const raw = scriptEl.value;
    placeholder.style.display = raw.trim().length ? 'none' : 'flex';
    track.textContent = '';

    if (axis === 'y') {
      buildWords(raw, track);           // pre-wrap keeps newlines and space runs verbatim
    } else {
      raw.split('\n').forEach((line, i) => {
        if (i > 0) {
          const gap = document.createElement('span');
          gap.className = 'gap';
          track.appendChild(gap);
        }
        buildWords(line, track);        // white-space:pre keeps space runs, no wrapping
      });
    }

    measure();
    updateCount();
    sendDocSoon();
  }

  // Cheap fingerprint of everything measure() depends on. Lets play() skip a
  // full timeline rebuild when nothing has actually moved.
  let geomSig = '';
  function geomKey() {
    return stage.clientWidth + 'x' + stage.clientHeight + '|' +
           track.style.fontSize + '|' + axis + '|' + track.childElementCount;
  }

  function measure() {
    if (axis === 'x') {
      track.style.paddingTop  = '';
      track.style.paddingLeft = stage.clientWidth + 'px';
      travel = track.scrollWidth;
    } else {
      track.style.paddingLeft = '';
      track.style.paddingTop  = stage.clientHeight + 'px';
      travel = track.scrollHeight;
    }
    clampPos();
    buildTimeline();
    applyTransform();
    geomSig = geomKey();
  }

  function buildTimeline() {
    spline = null; TTotal = 0; tsA = null; ysA = null; wordT = []; wordP = []; wordOff = [];
    rowOff = []; wordRow = []; rowFirst = [];

    const words = Array.from(track.querySelectorAll('.w'));
    if (!words.length) { tCur = 0; return; }

    const toks = tokenize(scriptEl.value);
    const n = Math.min(toks.length, words.length);
    const C = (axis === 'x') ? stage.clientWidth * 0.5 : stage.clientHeight * 0.5;

    const items = [];
    for (let i = 0; i < n; i++) {
      const el = words[i];
      el.dataset.wi = i;
      const off = (axis === 'x') ? el.offsetLeft : el.offsetTop;
      const offEnd = (axis === 'x') ? el.offsetLeft + el.offsetWidth : el.offsetTop;
      wordOff[i] = off;
      const s = sylCount(toks[i].w);
      const sl = spokenLen(toks[i].w);
      items.push({
        off: off,
        offEnd: offEnd,
        syl: s,
        pause: pauseFor(toks[i].w, toks[i].ws),
        slen: (sl == null) ? s * 3.5 : sl
      });
    }

    // In upward mode every word on a wrapped line shares one offsetTop, so sync
    // on rows rather than words. In sideways mode each word is its own row.
    for (let i = 0; i < n; i++) {
      if (!rowOff.length || wordOff[i] > rowOff[rowOff.length - 1] + 0.5) {
        rowOff.push(wordOff[i]);
        rowFirst.push(i);
      }
      wordRow[i] = rowOff.length - 1;
    }

    const built = buildAnchors(items, {
      C: C,
      travel: travel,
      wpm: +speedEl.value,
      alpha: (+paceEl.value) / 100
    });
    if (!built) { tCur = 0; return; }

    spline = pchip(built.ts, built.ys);
    tsA = built.ts; ysA = built.ys; TTotal = built.T;
    for (let i = 0; i < n; i++) {
      wordT[i] = built.ts[built.wordIdx[i]];
      wordP[i] = built.ys[built.wordIdx[i]];
    }

    tCur = invertPos(pos);
  }

  function invertPos(p) {
    if (!tsA) return 0;
    p = Math.max(-travel, Math.min(0, p));
    const n = ysA.length;
    if (p >= ysA[0]) return tsA[0];
    if (p <= ysA[n - 1]) return tsA[n - 1];
    let lo = 0, hi = n - 1;
    while (hi - lo > 1) {
      const mid = (lo + hi) >> 1;
      if (ysA[mid] >= p) lo = mid; else hi = mid;
    }
    const y0 = ysA[lo], y1 = ysA[hi];
    if (y0 === y1) return tsA[lo];
    return tsA[lo] + (y0 - p) / (y0 - y1) * (tsA[hi] - tsA[lo]);
  }

  function clampPos() { pos = Math.max(-travel, Math.min(0, pos)); }

  function applyTransform() {
    track.style.transform = (axis === 'x')
      ? 'translate(' + pos + 'px, -50%)'
      : 'translate(-50%, ' + pos + 'px)';
  }

  function updateCount() {
    const txt = scriptEl.value.trim();
    const words = txt ? txt.split(/\s+/).length : 0;
    let dur = '';
    if (words && TTotal > 0) {
      const m = Math.floor(TTotal / 60);
      const s = Math.round(TTotal % 60);
      dur = '  \u00b7  ~' + m + ':' + String(s).padStart(2, '0');
    }
    countEl.textContent = words + (words === 1 ? ' word' : ' words') + dur;
  }

  /* ---------- transport ---------- */

  function frame(ts) {
    if (!running) return;
    if (!spline) { stop(); return; }
    if (lastTs === null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;

    tCur += dt;

    if (ts - lastPosSave > 1500) {
      saveCurrentPos(); save(); lastPosSave = ts;
    }

    if (tCur >= TTotal) {
      stop();
      tCur = 0; pos = 0;
      saveCurrentPos();
      applyTransform();
      save();
      return;
    }

    pos = spline(tCur);
    applyTransform();
    sendState(false);
    requestAnimationFrame(frame);
  }

  async function keepAwake() {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) { /* unsupported */ }
  }
  function letSleep() {
    try { wakeLock && wakeLock.release(); } catch (e) {}
    wakeLock = null;
  }

  function play() {
    stopMomentum();
    if (!scriptEl.value.trim()) {
      store.settings.ui.edit = true;
      applyDrawers();
      save();
      scriptEl.focus();
      return;
    }
    running = true;
    lastTs = null;
    document.body.classList.add('live');
    playIcon.textContent = '\u275a\u275a';
    playLabel.textContent = 'PAUSE';
    sendState(true);                                    // announce before any heavy work
    if (!spline || geomKey() !== geomSig) measure();    // rebuild only if layout moved
    keepAwake();
    requestAnimationFrame(frame);
  }

  function stop() {
    running = false;
    document.body.classList.remove('live');
    playIcon.textContent = '\u25b6';
    playLabel.textContent = 'PLAY';
    letSleep();
    saveCurrentPos();
    sendState(true);      // the remote hears about the stop before any disk work
    save();
  }

  function toggle() { running ? stop() : play(); }

  function reset() { stopMomentum(); stop(); pos = 0; tCur = 0; saveCurrentPos(); applyTransform(); save(); }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      saveCurrentPos(); save();
    } else if (isRemote) {
      rWf = null; rCorr = 0;
      keepAwake();
      startRemote();
    } else if (running) {
      keepAwake();
    }
  });
  window.addEventListener('pagehide', () => { saveCurrentPos(); save(); });

  /* ---------- scrub / fling / tap ---------- */

  let scrub = null;         // active drag gesture
  let suppressTap = false;  // eat the click generated by a drag, a pause-tap, or a glide-catch
  let momentum = null;      // active fling animation

  function stopMomentum() {
    if (momentum) { cancelAnimationFrame(momentum.raf); momentum = null; }
  }

  function settleScrub() {
    if (isRemote) {
      sendSeek(true);
      rHold(300);        // brief grace so the prompter's reply doesn't yank it back
      startRemote();
      return;
    }
    tCur = invertPos(pos);
    saveCurrentPos();
    save();
  }

  function startMomentum(v) {
    if (Math.abs(v) < 60) { settleScrub(); return; }
    momentum = { v: Math.max(-9000, Math.min(9000, v)), last: performance.now(), raf: 0 };
    const step = (now) => {
      if (!momentum) return;
      const dt = Math.min((now - momentum.last) / 1000, 0.05);
      momentum.last = now;
      pos += momentum.v * dt;
      const clamped = Math.max(-travel, Math.min(0, pos));
      const hitEdge = clamped !== pos;
      pos = clamped;
      applyTransform();
      if (isRemote) { rHold(1500); sendSeek(false); }
      momentum.v *= Math.pow(0.998, dt * 1000);   // iOS-style deceleration
      if (hitEdge || Math.abs(momentum.v) < 15) {
        momentum = null;
        settleScrub();
        return;
      }
      momentum.raf = requestAnimationFrame(step);
    };
    momentum.raf = requestAnimationFrame(step);
  }

  stage.addEventListener('pointerdown', (e) => {
    suppressTap = false;
    if (scrub || !scriptEl.value.trim()) return;
    const hadMomentum = !!momentum;
    stopMomentum();
    const wasRunning = isRemote ? rRunning : running;
    if (isRemote) {
      if (rRunning) { rRunning = false; paintTransport(); cmd('pause'); }
      rHold(1500);
    } else if (running) {
      stop();                               // grabbing the stage pauses it
    }
    scrub = {
      id: e.pointerId, x: e.clientX, y: e.clientY,
      startPos: pos, moved: false,
      wasRunning: wasRunning, hadMomentum: hadMomentum,
      samples: [{ t: e.timeStamp, p: pos }]
    };
  });

  stage.addEventListener('pointermove', (e) => {
    if (!scrub || e.pointerId !== scrub.id) return;
    const dx = e.clientX - scrub.x;
    const dy = e.clientY - scrub.y;
    if (!scrub.moved) {
      if (Math.hypot(dx, dy) < 7) return;   // still a tap
      scrub.moved = true;
      stage.classList.add('scrubbing');
      try { stage.setPointerCapture(e.pointerId); } catch (err) {}
    }
    const flipped = (axis === 'x')
      ? stage.classList.contains('flip-h')
      : stage.classList.contains('flip-v');
    const d = ((axis === 'x') ? dx : dy) * (flipped ? -1 : 1);
    pos = Math.max(-travel, Math.min(0, scrub.startPos + d));
    applyTransform();
    if (isRemote) { rHold(1500); sendSeek(false); }
    scrub.samples.push({ t: e.timeStamp, p: pos });
    while (scrub.samples.length > 2 && e.timeStamp - scrub.samples[0].t > 120) scrub.samples.shift();
  });

  function endScrub(e) {
    if (!scrub || e.pointerId !== scrub.id) return;
    const s = scrub;
    scrub = null;
    stage.classList.remove('scrubbing');
    if (s.moved) {
      suppressTap = true;
      const first = s.samples[0];
      const last = s.samples[s.samples.length - 1];
      const span = (last.t - first.t) / 1000;
      const v = (span > 0.02) ? (last.p - first.p) / span : 0;
      startMomentum(v);                     // settles in place when the hand wasn't moving
    } else if (s.wasRunning || s.hadMomentum) {
      suppressTap = true;                   // that tap paused playback or caught a glide
      settleScrub();
    }
  }
  window.addEventListener('pointerup', endScrub);
  window.addEventListener('pointercancel', endScrub);

  stage.addEventListener('click', (e) => {
    if (suppressTap) { suppressTap = false; return; }
    if (isRemote) {
      const rw = e.target.closest('.w');
      if (rw && track.contains(rw)) {
        cmd('jump', { wi: +rw.dataset.wi });
        rWf = +rw.dataset.wi; rCorr = 0; rSeen = rWf; startRemote();
        rw.classList.remove('hit');
        void rw.offsetWidth;
        rw.classList.add('hit');
      }
      return;
    }
    if (running) { toggle(); return; }
    if (document.fullscreenElement || document.webkitFullscreenElement) { play(); return; }
    const w = e.target.closest('.w');
    if (!w || !track.contains(w)) return;
    const wi = +w.dataset.wi;
    if (wordT[wi] != null) {
      tCur = wordT[wi];
      pos = Math.max(-travel, Math.min(0, wordP[wi]));
    } else {
      const target = (axis === 'x')
        ? stage.clientWidth * 0.5 - w.offsetLeft
        : stage.clientHeight * 0.5 - w.offsetTop;
      pos = Math.max(-travel, Math.min(0, target));
      tCur = invertPos(pos);
    }
    applyTransform();
    saveCurrentPos();
    save();
    w.classList.remove('hit');
    void w.offsetWidth;
    w.classList.add('hit');
  });

  /* ---------- direction ---------- */

  function setAxis(next) {
    if (next === axis) return;
    saveCurrentPos();
    persistControls();
    stop();

    axis = next;
    store.settings.axis = axis;
    stage.dataset.axis = axis;

    sizeEl.value = store.settings[axis].size;
    sizeOut.textContent = sizeEl.value;
    applyTrackSize();

    axisXBtn.classList.toggle('on', axis === 'x');
    axisYBtn.classList.toggle('on', axis === 'y');
    axisXBtn.setAttribute('aria-pressed', axis === 'x');
    axisYBtn.setAttribute('aria-pressed', axis === 'y');

    const a = active();
    pos = a ? (axis === 'x' ? a.posX : a.posY) || 0 : 0;
    render();
    save();
  }

  /* ---------- scripts / tabs ---------- */

  function renderTabs() {
    tabbar.textContent = '';
    store.scripts.forEach(s => {
      const b = document.createElement('button');
      b.className = 'tab' + (s.id === store.activeId ? ' on' : '');
      b.dataset.id = s.id;

      const name = document.createElement('span');
      name.className = 'tname';
      name.textContent = s.name;
      b.appendChild(name);

      if (s.id === store.activeId) {
        const x = document.createElement('span');
        x.className = 'tx';
        x.textContent = '\u00d7';
        x.title = 'Delete this script';
        b.appendChild(x);
      }
      tabbar.appendChild(b);
    });
  }

  function loadActive() {
    const a = active();
    scriptEl.value = a ? a.text : '';
    pos = a ? (axis === 'x' ? a.posX : a.posY) || 0 : 0;
    render();               // measure() inside clamps pos, rebuilds timeline, applies transform
  }

  function switchTo(id) {
    if (id === store.activeId) return;
    saveCurrentPos();
    stop();
    store.activeId = id;
    loadActive();
    renderTabs();
    save();
  }

  function renameActive() {
    const a = active();
    if (!a) return;
    const nn = prompt('Script name:', a.name);
    if (nn && nn.trim()) {
      a.name = nn.trim().slice(0, 60);
      renderTabs();
      save();
    }
  }

  function deleteActive() {
    const a = active();
    if (!a) return;
    if (!confirm('Delete "' + a.name + '"? This cannot be undone.')) return;
    const idx = store.scripts.findIndex(s => s.id === a.id);
    store.scripts.splice(idx, 1);
    if (!store.scripts.length) {
      const id = uid();
      store.scripts.push({ id: id, name: 'Script 1', text: '', posX: 0, posY: 0 });
    }
    store.activeId = store.scripts[Math.max(0, idx - 1)].id;
    stop();
    loadActive();
    renderTabs();
    save();
  }

  function newScript() {
    saveCurrentPos();
    stop();
    const id = uid();
    store.scripts.push({ id: id, name: 'Script ' + (store.scripts.length + 1), text: '', posX: 0, posY: 0 });
    store.activeId = id;
    loadActive();
    renderTabs();
    save();
    store.settings.ui.edit = true;
    applyDrawers();
    save();
    scriptEl.focus();
  }

  tabbar.addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    if (e.target.closest('.tx')) { deleteActive(); return; }
    if (tab.dataset.id === store.activeId) { renameActive(); return; }
    switchTo(tab.dataset.id);
  });

  /* ---------- export / import ---------- */

  function doExport() {
    const payload = {
      app: 'juscript',
      version: 1,
      exported: new Date().toISOString(),
      scripts: store.scripts.map(s => ({ name: s.name, text: s.text }))
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'juscript-' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  function doImport(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const list = Array.isArray(data) ? data : data.scripts;
        if (!Array.isArray(list) || !list.length) throw new Error('empty');
        const clean = list
          .filter(s => s && typeof s.text === 'string')
          .map(s => ({
            id: uid(),
            name: (typeof s.name === 'string' && s.name.trim()) ? s.name.trim().slice(0, 60) : 'Imported',
            text: s.text,
            posX: 0, posY: 0
          }));
        if (!clean.length) throw new Error('none');
        saveCurrentPos();
        stop();
        store.scripts = store.scripts.concat(clean);
        store.activeId = clean[0].id;
        loadActive();
        renderTabs();
        save();
      } catch (err) {
        alert("Couldn't read that file \u2014 it doesn't look like a JuScript export.");
      }
    };
    reader.readAsText(file);
  }

  /* ---------- wiring ---------- */

  function wire(el, fn) {
    el.addEventListener('click', () => { fn(); el.blur(); });
  }

  wire(playBtn, () => {
    if (!isRemote) { toggle(); return; }
    rRunning = !rRunning;      // flip locally first; the prompter's reply confirms it
    paintTransport();
    startRemote();
    cmd('toggle');
  });
  wire(resetBtn, () => isRemote ? cmd('reset') : reset());

  wire(newTabBtn, newScript);
  wire(exportBtn, doExport);
  wire(importBtn, () => fileIn.click());
  fileIn.addEventListener('change', () => {
    if (fileIn.files && fileIn.files[0]) doImport(fileIn.files[0]);
    fileIn.value = '';
  });

  wire(axisXBtn, () => setAxis('x'));
  wire(axisYBtn, () => setAxis('y'));
  wire(flipHBtn, () => {
    stage.classList.toggle('flip-h');
    store.settings.flipH = stage.classList.contains('flip-h');
    flipHBtn.classList.toggle('on', store.settings.flipH);
    save();
  });
  wire(flipVBtn, () => {
    stage.classList.toggle('flip-v');
    store.settings.flipV = stage.classList.contains('flip-v');
    flipVBtn.classList.toggle('on', store.settings.flipV);
    save();
  });
  wire(document.getElementById('fsRemote'), () => cmd('clean'));
  wire(fsBtn, () => {
    const inFs = document.fullscreenElement || document.webkitFullscreenElement;
    if (!inFs) {
      const req = stage.requestFullscreen || stage.webkitRequestFullscreen;
      if (req) req.call(stage); else stage.scrollIntoView();
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) exit.call(document);
    }
  });

  function setFont(f) {
    store.settings.font = f;
    track.classList.toggle('font-serif', f === 'serif');
    fontSansBtn.classList.toggle('on', f === 'sans');
    fontSerifBtn.classList.toggle('on', f === 'serif');
    fontSansBtn.setAttribute('aria-pressed', f === 'sans');
    fontSerifBtn.setAttribute('aria-pressed', f === 'serif');
    measure();
    updateCount();
    save();
  }
  wire(fontSansBtn, () => setFont('sans'));
  wire(fontSerifBtn, () => setFont('serif'));

  /* sliders + hold-to-repeat steppers */

  function afterSpeed() {
    speedOut.textContent = speedEl.value;
    buildTimeline();
    applyTransform();
    updateCount();
  }
  function afterPace() {
    paceOut.textContent = paceEl.value + '%';
    buildTimeline();
    applyTransform();
    updateCount();
  }
  function afterSize() {
    sizeOut.textContent = sizeEl.value;
    applyTrackSize();
    measure();
    updateCount();
  }

  speedEl.addEventListener('input', afterSpeed);
  speedEl.addEventListener('change', () => {
    if (isRemote) { link.lastWpm = performance.now(); cmd('wpmset', { v: +speedEl.value }); speedEl.blur(); return; }
    persistControls(); speedEl.blur();
  });
  paceEl.addEventListener('input', afterPace);
  paceEl.addEventListener('change', () => { persistControls(); paceEl.blur(); });
  sizeEl.addEventListener('input', afterSize);
  sizeEl.addEventListener('change', () => {
    if (isRemote) { link.lastSize = performance.now(); cmd('sizeset', { v: +sizeEl.value }); sizeEl.blur(); return; }
    persistControls(); sizeEl.blur();
  });

  function bump(input, delta, after) {
    input.value = Math.max(+input.min, Math.min(+input.max, +input.value + delta));
    after();
    persistControls();
  }

  function holdable(btn, fn) {
    let delay = null, rep = null, sup = false;
    const stopRepeat = () => { clearTimeout(delay); clearInterval(rep); delay = rep = null; };
    btn.addEventListener('pointerdown', () => {
      sup = true;
      fn();
      stopRepeat();
      delay = setTimeout(() => { rep = setInterval(fn, 80); }, 450);
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(ev =>
      btn.addEventListener(ev, () => { stopRepeat(); btn.blur(); })
    );
    btn.addEventListener('click', (e) => {
      if (sup) { sup = false; e.preventDefault(); return; }
      fn();               // keyboard activation
      btn.blur();
    });
  }

  holdable(document.getElementById('speedDown'), () =>
    isRemote ? (link.lastWpm = performance.now(), cmd('wpm', { d: -5 })) : bump(speedEl, -5, afterSpeed));
  holdable(document.getElementById('speedUp'),   () =>
    isRemote ? (link.lastWpm = performance.now(), cmd('wpm', { d:  5 })) : bump(speedEl,  5, afterSpeed));
  holdable(document.getElementById('paceDown'),  () => bump(paceEl,  -5, afterPace));
  holdable(document.getElementById('paceUp'),    () => bump(paceEl,   5, afterPace));
  function bumpSize(d) {
    bump(sizeEl, d, afterSize);
    if (isRemote) { link.lastSize = performance.now(); cmd('sizeset', { v: +sizeEl.value }); }
  }
  holdable(document.getElementById('sizeDown'),  () => bumpSize(-2));
  holdable(document.getElementById('sizeUp'),    () => bumpSize(2));

  document.getElementById('swatches').addEventListener('click', (e) => {
    const b = e.target.closest('.swatch');
    if (!b) return;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
    b.classList.add('on');
    track.style.color = b.dataset.color;
    store.settings.color = b.dataset.color;
    save();
    b.blur();
  });

  const tabsToggle = document.getElementById('tabsToggle');
  const editToggle = document.getElementById('editToggle');
  const topToggle  = document.getElementById('topToggle');

  function applyDrawers() {
    const ui = store.settings.ui;
    document.body.classList.toggle('tabs-open', !!ui.tabs);
    document.body.classList.toggle('edit-open', !!ui.edit);
    document.body.classList.toggle('top-open', !!ui.top);
    tabsToggle.classList.toggle('open', !!ui.tabs);
    editToggle.classList.toggle('open', !!ui.edit);
    tabsToggle.setAttribute('aria-expanded', !!ui.tabs);
    editToggle.setAttribute('aria-expanded', !!ui.edit);
    topToggle.setAttribute('aria-expanded', !!ui.top);
  }

  wire(topToggle, () => {
    if (document.body.classList.contains('clean')) {
      document.body.classList.remove('clean');   // tapping the chevron exits clean mode
      store.settings.ui.top = true;
    } else {
      store.settings.ui.top = !store.settings.ui.top;
    }
    applyDrawers();
    save();
    requestAnimationFrame(() => { measure(); sendState(true); });
  });

  wire(tabsToggle, () => {
    store.settings.ui.tabs = !store.settings.ui.tabs;
    applyDrawers();
    save();
    requestAnimationFrame(measure);
  });
  wire(editToggle, () => {
    store.settings.ui.edit = !store.settings.ui.edit;
    applyDrawers();
    save();
    requestAnimationFrame(measure);
  });

  scriptEl.addEventListener('input', () => {
    const a = active();
    if (a) a.text = scriptEl.value;
    if (!running) { pos = 0; tCur = 0; saveCurrentPos(); }
    render();
    save();
  });

  let rt;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => {
      if (isRemote) applyTrackSize();
      measure();
      updateCount();
    }, 120);
  });

  /* ---------- pairing sheet ---------- */

  const sheet     = document.getElementById('sheet');
  const relayUrl  = document.getElementById('relayUrl');
  const roomCode  = document.getElementById('roomCode');
  const sheetNote = document.getElementById('sheetNote');
  const sheetSub  = document.getElementById('sheetSub');
  const sheetLink = document.getElementById('sheetLink');
  const adv       = document.getElementById('adv');

  function remoteLink() {
    const cfg = store.settings.link;
    let u = location.origin + location.pathname + '?r=' + encodeURIComponent(cfg.code || '');
    if (cfg.url && cfg.url !== DEFAULT_RELAY) u += '&u=' + encodeURIComponent(cfg.url);
    return u + '#remote';
  }

  function paintSheet() {
    relayUrl.value = store.settings.link.url || '';
    roomCode.value = store.settings.link.code || '';
    const st = !link.want ? 'Not set up yet.'
             : !link.ok   ? 'Connecting\u2026'
             : link.peers > 1 ? 'Connected \u2014 both devices are linked.'
             : 'Connected, waiting for the other device.';
    if (isRemote) {
      sheetSub.textContent = 'This phone is the remote.';
      sheetLink.style.display = 'none';
      document.getElementById('sheetCopy').style.display = 'none';
      document.getElementById('sheetNew').style.display = 'none';
      if (!store.settings.link.code) adv.open = true;
    } else {
      sheetSub.textContent = 'Open this on the second phone once. She can add it to her home screen and it will work every time after that.';
      sheetLink.style.display = '';
      sheetLink.textContent = remoteLink();
    }
    sheetNote.textContent = st;
  }

  function openSheet() { paintSheet(); document.body.classList.add('sheet-open'); }

  function commitSheet() {
    const u = relayUrl.value.trim()
                .replace(/^http:\/\//i, 'ws://')
                .replace(/^https:\/\//i, 'wss://')
                .replace(/\/+$/, '');
    const c = roomCode.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 8);
    const changed = (u !== store.settings.link.url) || (c !== (store.settings.link.code || ''));
    store.settings.link.url = u;
    store.settings.link.code = (c.length >= 4) ? c : null;
    save();
    linkStatus();
    if (changed) linkConnect();
  }

  wire(document.getElementById('linkBtn'), openSheet);
  wire(document.getElementById('sheetNew'), () => {
    roomCode.value = makeCode();
    commitSheet();
    paintSheet();
  });
  wire(document.getElementById('sheetCopy'), () => {
    commitSheet();
    const t = remoteLink();
    if (navigator.share) {
      navigator.share({ title: 'JuScript remote', url: t }).catch(() => {});
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).then(
        () => { sheetNote.textContent = 'Copied to the clipboard.'; },
        () => {}
      );
    }
  });
  wire(document.getElementById('sheetClose'), () => {
    commitSheet();
    document.body.classList.remove('sheet-open');
  });
  sheet.addEventListener('click', (e) => {
    if (e.target === sheet) { commitSheet(); document.body.classList.remove('sheet-open'); }
  });

  /* ---------- init ---------- */

  stage.dataset.axis = axis;
  axisXBtn.classList.toggle('on', axis === 'x');
  axisYBtn.classList.toggle('on', axis === 'y');
  axisXBtn.setAttribute('aria-pressed', axis === 'x');
  axisYBtn.setAttribute('aria-pressed', axis === 'y');

  speedEl.value = store.settings.wpm;
  paceEl.value  = store.settings.pacing;
  sizeEl.value  = store.settings[axis].size;
  speedOut.textContent = speedEl.value;
  paceOut.textContent  = paceEl.value + '%';
  sizeOut.textContent  = sizeEl.value;
  applyTrackSize();

  track.style.color = store.settings.color || '#ffffff';
  document.querySelectorAll('.swatch').forEach(s =>
    s.classList.toggle('on', s.dataset.color === (store.settings.color || '#ffffff'))
  );

  document.body.classList.toggle('remote', isRemote);
  applyDrawers();

  (function setFontInit() {
    const f = store.settings.font === 'serif' ? 'serif' : 'sans';
    track.classList.toggle('font-serif', f === 'serif');
    fontSansBtn.classList.toggle('on', f === 'sans');
    fontSerifBtn.classList.toggle('on', f === 'serif');
    fontSansBtn.setAttribute('aria-pressed', f === 'sans');
    fontSerifBtn.setAttribute('aria-pressed', f === 'serif');
  })();

  if (store.settings.flipH) { stage.classList.add('flip-h'); flipHBtn.classList.add('on'); }
  if (store.settings.flipV) { stage.classList.add('flip-v'); flipVBtn.classList.add('on'); }

  renderTabs();
  loadActive();
  save();

  if (urlRelay) store.settings.link.url = urlRelay;
  if (!store.settings.link.url) store.settings.link.url = DEFAULT_RELAY;
  if (urlCode)  store.settings.link.code = urlCode;
  if (!store.settings.link.code && !isRemote) store.settings.link.code = makeCode();
  save();
  linkStatus();
  if (store.settings.link.url && store.settings.link.code) linkConnect();
  else if (isRemote) openSheet();

  setInterval(() => { if (!isRemote) sendState(false); }, 250);

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { measure(); });
  }
})();
</script>
</body>
</html>
